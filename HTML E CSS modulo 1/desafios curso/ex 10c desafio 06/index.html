<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das tags</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <h2>Em HTML5, podemos inserie os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</h2>
    <ul type="square">
        <li> <span title="Use a tag <p>">Parágrafo</span> </li>
        <li><span title="Use a tag <h1> até a tag <h6>">Títulos</span></li>
        <li><span title="Use a tag <img>">Imagens</span></li>
        <li><span title="Use a tag <abbr>">Abreviações</span></li>
        <li><span title="Use a tag <code>">Códigos-Fonte</span></li>
        <li><span title="Use a tag <ol> + a tag <li>">Lista numerada</span></li>
        <li><span title="Use a tag <ul> + a tag <li>">Lista com demarcadores</span></li>
    </ul>
</body>
</html>
