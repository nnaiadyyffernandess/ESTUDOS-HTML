<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas e Listas</title>
</head>
<body>
    <h1>Tabelas</h1>
    <table>
        <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Cidade</th>
        </tr>
        <tr>
            <td>Ana Silva</td>
            <td>28</td>
            <td>São Paulo</td>
        </tr>
        <tr>
            <td>Bruno Costa</td>
            <td>34</td>
            <td>Rio de Janeiro</td>
        </tr>
        <tr>
            <td>Carla Souza</td>
            <td>22</td>
            <td>Belo Horizonte</td>
        </tr>

    </table>
    <h1> Listas </h1>
    <h2>Lista Ordenada</h2>
    <ol>
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
    </ol>
    <h2>Lista Não Ordenada</h2>
    <ul>
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
    </ul>
</body>
</html>
