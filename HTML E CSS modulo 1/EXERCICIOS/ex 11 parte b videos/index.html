<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserindo vídeos</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor</p>

   <video width="560" height="315" poster="imagens/download.jpg" controls autoplay loop>
    <source src="midias/video teste para site.MOV" type="video/mp4">
    <source src="midias/TRIAL____________video teste para site.webm" type="video/webm">
    <p>Seu navegador não suporta vídeos.</p>
   </video>

   <h1>Inserindo vídeos do youtube</h1>
  
   <iframe
  width="560"
  height="315"
  src="https://www.youtube.com/embed/Ejkb_YpuHWs"
  title="YouTube video player"
  frameborder="0"
  allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>

    
</body>
</html>
