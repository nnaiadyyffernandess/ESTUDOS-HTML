<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes, ou simplesmente aumente e diminua o tamanho da janela do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/imagempequena.png" type="image/png">
        <source media="(max-width:1050px)" srcset="imagens/imagemmedia.png" type="image/png">
        <img src="imagens/imagemgrande.png" alt="Imagem Flexível"> 
    </picture>
    <h1>Reproduzindo áudios </h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio src="midia/By Myself - The Grey Room _ Clark Sims.mp3" controls autoplay></audio>
    <p>Uma outra maneira</p>
    <audio preload="metadata" autoplay controls > 
         <source src="midia/By Myself - The Grey Room _ Clark Sims.mp3" type="audio/mpeg"> 
          <source src="midia/By Myself - The Grey Room _ Clark Sims.mp3" type="audio/ogg">
          <source src="midia/By Myself - The Grey Room _ Clark Sims.mp3" type="audio/wav"> (!! OBS: Coloquei o mesmo arquivo em todos os formatos apenas para exemplificar. Na prática, você deve usar arquivos diferentes para cada formato !!)
          <p>Infelizmente seu navegador não consegue reproduzir áudio.</p>
          <a href="midia/By Myself - The Grey Room _ Clark Sims.mp3">Clique aqui para baixar o áudio</a>
    </audio>
</body>
</html>
