<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Valentine Cupcake';
            src: url('Valentine Cupcake.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        /* Tipos de formatos: 
        opentype, truetype, woff, woff2, svg, embedded-opentype, truetype-aat.
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        
        }
        h1 {
            font-family: 'Valentine Cupcake', Times, serif;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum a sed unde velit deleniti neque. Blanditiis eum itaque amet dolores cupiditate. Eligendi fugit inventore placeat itaque! Dolores perferendis voluptas tenetur.</p>
</body>
</html>
