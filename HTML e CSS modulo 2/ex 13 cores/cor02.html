<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { <!---Gradiente linear, mas também pode usar outros--->
            
            background-image: linear-gradient(to bottom, white, rgb(171, 159, 248), rgb(141, 168, 255));
            background-attachment: fixed;
        }
    </style>


</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
